<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas - Ferramentas Rápidas</title>
    <meta name="description" content="Gere senhas seguras e aleatórias com comprimento e caracteres personalizados. Proteja suas contas online.">
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1400761908032605"
     crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="../index.html" class="logo">Ferramentas<span>Rápidas</span></a>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../index.html#ferramentas">Ferramentas</a></li>
                    <li><a href="../sobre.html">Sobre</a></li>
                    <li><a href="../contato.html">Contato</a></li>
                    <li><a href="../politica-de-privacidade.html">Privacidade</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="tool-container">
            <div class="tool-header">
                <h1>Gerador de Senhas Seguras</h1>
                <p style="color: var(--text-muted);">Crie senhas impossíveis de quebrar em segundos.</p>
            </div>
            
            <div class="input-group">
                <label for="length">Comprimento da Senha: <span id="length-val" style="color: var(--primary); font-weight: 800;">16</span></label>
                <input type="range" id="length" min="4" max="50" value="16" style="width: 100%; height: 8px; background: var(--border); border-radius: 5px; appearance: none; outline: none;">
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid var(--border);">
                <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 0; cursor: pointer;">
                    <input type="checkbox" id="uppercase" checked style="width: 20px; height: 20px;"> Letras ABC
                </label>
                <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 0; cursor: pointer;">
                    <input type="checkbox" id="lowercase" checked style="width: 20px; height: 20px;"> Letras abc
                </label>
                <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 0; cursor: pointer;">
                    <input type="checkbox" id="numbers" checked style="width: 20px; height: 20px;"> Números 123
                </label>
                <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 0; cursor: pointer;">
                    <input type="checkbox" id="symbols" checked style="width: 20px; height: 20px;"> Símbolos !@#
                </label>
            </div>

            <button class="btn" onclick="generatePassword()" style="width: 100%; margin-bottom: 30px;">Gerar Nova Senha</button>

            <div class="input-group">
                <label>Senha Gerada:</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="password-result" readonly style="font-family: 'JetBrains Mono', monospace; font-size: 1.3rem; text-align: center; letter-spacing: 2px; background: #fff; border-color: var(--primary);">
                    <button class="btn btn-secondary" onclick="copyPassword()">Copiar</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const lengthInput = document.getElementById('length');
        const lengthVal = document.getElementById('length-val');
        const resultInput = document.getElementById('password-result');

        lengthInput.addEventListener('input', () => {
            lengthVal.textContent = lengthInput.value;
        });

        function generatePassword() {
            const length = +lengthInput.value;
            const hasUpper = document.getElementById('uppercase').checked;
            const hasLower = document.getElementById('lowercase').checked;
            const hasNumber = document.getElementById('numbers').checked;
            const hasSymbol = document.getElementById('symbols').checked;

            const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const lower = 'abcdefghijklmnopqrstuvwxyz';
            const numbers = '0123456789';
            const symbols = '!@#$%^&*()_+~`|}{[]:;?><,./-=';

            let charset = '';
            if (hasUpper) charset += upper;
            if (hasLower) charset += lower;
            if (hasNumber) charset += numbers;
            if (hasSymbol) charset += symbols;

            if (charset === '') {
                alert('Selecione pelo menos uma opção!');
                return;
            }

            let password = '';
            for (let i = 0; i < length; i++) {
                password += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            resultInput.value = password;
        }

        function copyPassword() {
            resultInput.select();
            document.execCommand('copy');
            alert('Senha copiada!');
        }

        generatePassword();
    </script>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Ferramentas Rápidas. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>
</body>
</html>
