<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Caracteres - Ferramentas Rápidas</title>
    <meta name="description" content="Conte caracteres com e sem espaços. Ideal para limites de redes sociais como Twitter e Instagram.">
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="../index.html" class="logo">Ferramentas<span>Rápidas</span></a>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../index.html#ferramentas">Ferramentas</a></li>
                    <li><a href="../sobre.html">Sobre</a></li>
                    <li><a href="../contato.html">Contato</a></li>
                    <li><a href="../politica-de-privacidade.html">Privacidade</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="tool-container">
            <div class="tool-header">
                <h1>Contador de Caracteres</h1>
                <p style="color: var(--text-muted);">Verifique o tamanho do seu texto para redes sociais e outros limites.</p>
            </div>
            
            <div class="input-group">
                <label for="text-input">Insira seu texto:</label>
                <textarea id="text-input" rows="10" placeholder="Digite ou cole seu texto aqui..."></textarea>
            </div>
            
            <div class="results">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                    <div style="background: white; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid var(--border);">
                        <span id="total-chars" style="display: block; font-size: 2rem; font-weight: 800; color: var(--primary);">0</span>
                        <span style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700;">Total (com espaços)</span>
                    </div>
                    <div style="background: white; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid var(--border);">
                        <span id="no-space-chars" style="display: block; font-size: 2rem; font-weight: 800; color: var(--primary);">0</span>
                        <span style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700;">Sem espaços</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const textarea = document.getElementById('text-input');
        const totalChars = document.getElementById('total-chars');
        const noSpaceChars = document.getElementById('no-space-chars');

        textarea.addEventListener('input', () => {
            const val = textarea.value;
            totalChars.textContent = val.length;
            noSpaceChars.textContent = val.replace(/\s/g, '').length;
        });
    </script>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Ferramentas Rápidas. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>
</body>
</html>
