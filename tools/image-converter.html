<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Imagem - Ferramentas Rápidas</title>
    <meta name="description" content="Converta suas imagens entre os formatos PNG, JPG e WEBP de forma instantânea e segura diretamente no seu navegador.">
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="../index.html" class="logo">Ferramentas<span>Rápidas</span></a>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../index.html#ferramentas">Ferramentas</a></li>
                    <li><a href="../sobre.html">Sobre</a></li>
                    <li><a href="../contato.html">Contato</a></li>
                    <li><a href="../politica-de-privacidade.html">Privacidade</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="tool-container">
            <div class="tool-header">
                <h1>Conversor de Imagem</h1>
                <p style="color: var(--text-muted);">Converta suas fotos para o formato desejado sem perder qualidade e com total privacidade.</p>
            </div>
            
            <div class="input-group">
                <label for="image-input">Selecione a imagem:</label>
                <input type="file" id="image-input" accept="image/*">
            </div>

            <div class="input-group">
                <label for="format-select">Converter para:</label>
                <select id="format-select">
                    <option value="image/jpeg">JPG</option>
                    <option value="image/png">PNG</option>
                    <option value="image/webp">WEBP</option>
                </select>
            </div>

            <div id="preview-container" style="display: none; text-align: center; margin-bottom: 30px;">
                <p style="margin-bottom: 10px; font-weight: 600;">Prévia:</p>
                <img id="preview-img" style="max-width: 100%; max-height: 400px; border-radius: 12px; border: 1px solid var(--border);">
            </div>

            <button id="convert-btn" class="btn" style="width: 100%; display: none;">Converter e Baixar</button>

            <canvas id="canvas" style="display: none;"></canvas>
        </div>
    </main>

    <script>
        const input = document.getElementById('image-input');
        const preview = document.getElementById('preview-img');
        const previewContainer = document.getElementById('preview-container');
        const convertBtn = document.getElementById('convert-btn');
        const formatSelect = document.getElementById('format-select');
        const canvas = document.getElementById('canvas');

        input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    preview.src = event.target.result;
                    previewContainer.style.display = 'block';
                    convertBtn.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        convertBtn.addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                
                const format = formatSelect.value;
                
                // Se for JPG, preencher fundo com branco para evitar transparência preta
                if (format === 'image/jpeg') {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                
                ctx.drawImage(img, 0, 0);
                
                const dataUrl = canvas.toDataURL(format, 0.9);
                const extension = format.split('/')[1];
                
                const link = document.createElement('a');
                link.download = `imagem-convertida.${extension === 'jpeg' ? 'jpg' : extension}`;
                link.href = dataUrl;
                link.click();
            };
            img.src = preview.src;
        });
    </script>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Ferramentas Rápidas. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>
</body>
</html>
