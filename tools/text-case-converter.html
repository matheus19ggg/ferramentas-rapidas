<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Texto - Ferramentas Rápidas</title>
    <meta name="description" content="Converta seu texto para maiúsculo, minúsculo ou com a primeira letra de cada frase em maiúsculo.">
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1400761908032605"
     crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="../index.html" class="logo">Ferramentas<span>Rápidas</span></a>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../index.html#ferramentas">Ferramentas</a></li>
                    <li><a href="../sobre.html">Sobre</a></li>
                    <li><a href="../contato.html">Contato</a></li>
                    <li><a href="../politica-de-privacidade.html">Privacidade</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="tool-container">
            <div class="tool-header">
                <h1>Conversor de Texto</h1>
                <p style="color: var(--text-muted);">Altere a capitalização do seu texto de forma rápida e prática.</p>
            </div>
            
            <div class="input-group">
                <label for="text-input">Texto original:</label>
                <textarea id="text-input" rows="8" placeholder="Digite seu texto aqui..."></textarea>
            </div>
            
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px;">
                <button class="btn" onclick="transform('upper')">MAIÚSCULO</button>
                <button class="btn" onclick="transform('lower')">minúsculo</button>
                <button class="btn" onclick="transform('capitalize')">Capitalizado</button>
                <button class="btn btn-secondary" onclick="copy()">Copiar Resultado</button>
            </div>

            <div class="input-group">
                <label for="text-output">Resultado:</label>
                <textarea id="text-output" rows="8" readonly placeholder="O resultado aparecerá aqui..."></textarea>
            </div>
        </div>
    </main>

    <script>
        const input = document.getElementById('text-input');
        const output = document.getElementById('text-output');

        function transform(type) {
            const val = input.value;
            if (type === 'upper') {
                output.value = val.toUpperCase();
            } else if (type === 'lower') {
                output.value = val.toLowerCase();
            } else if (type === 'capitalize') {
                output.value = val.toLowerCase().replace(/(^\w|\s\w)/g, m => m.toUpperCase());
            }
        }

        function copy() {
            output.select();
            document.execCommand('copy');
            alert('Texto copiado!');
        }
    </script>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Ferramentas Rápidas. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>
</body>
</html>
